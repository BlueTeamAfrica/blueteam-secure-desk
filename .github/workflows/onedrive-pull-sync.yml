name: OneDrive Pull Sync

# Runs every 15 minutes to pull stage changes from OneDrive → Secure Desk.
# This replaces the Vercel cron job (which requires Pro plan).
#
# Required GitHub Actions secrets:
#   APP_URL      — Production URL, e.g. https://your-app.vercel.app
#   CRON_SECRET  — Same value as CRON_SECRET env var on Vercel

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  pull-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Trigger OneDrive pull sync
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/sync_response.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/onedrive-pull-sync")

          echo "HTTP status: $HTTP_STATUS"
          cat /tmp/sync_response.json

          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "Sync failed with HTTP $HTTP_STATUS"
            exit 1
          fi
